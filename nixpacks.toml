[variables]
NIXPACKS_NODE_VERSION = "24"
NPM_CONFIG_PRODUCTION = "false"
SITE_ROOT = "/app/dist"

[phases.setup]
nixPkgs = ["...", "caddy"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build", "test -f /app/dist/index.html"]

[start]
cmd = "caddy run --config Caddyfile --adapter caddyfile"
